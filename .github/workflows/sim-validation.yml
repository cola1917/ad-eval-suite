name: sim-validation

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_esmini_smoke:
        description: "Run optional esmini smoke job"
        required: false
        default: false
        type: boolean

jobs:
  xosc-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run xosc validation unit tests
        run: pytest tests/unit/test_xosc_validation_tools.py -q

      - name: Generate minimal xosc sample
        run: |
          mkdir -p .tmp/sim
          cat > .tmp/sim/minimal.xosc <<'XML'
          <?xml version="1.0" encoding="UTF-8"?>
          <OpenSCENARIO>
            <FileHeader revMajor="1" revMinor="0" date="2026-03-16T00:00:00Z" description="ci" author="github-actions"/>
            <Entities>
              <ScenarioObject name="ego" />
            </Entities>
            <Storyboard>
              <Story name="story">
                <Act name="act">
                  <ManeuverGroup name="mg" maximumExecutionCount="1">
                    <Maneuver name="m">
                      <Event name="e" priority="overwrite">
                        <Action name="a">
                          <PrivateAction>
                            <RoutingAction>
                              <FollowTrajectoryAction>
                                <Trajectory name="traj" closed="false">
                                  <Shape>
                                    <Polyline>
                                      <Vertex time="0.0"><Position><WorldPosition x="0" y="0" z="0" h="0" p="0" r="0"/></Position></Vertex>
                                      <Vertex time="1.0"><Position><WorldPosition x="1" y="0" z="0" h="0" p="0" r="0"/></Position></Vertex>
                                    </Polyline>
                                  </Shape>
                                </Trajectory>
                              </FollowTrajectoryAction>
                            </RoutingAction>
                          </PrivateAction>
                        </Action>
                      </Event>
                    </Maneuver>
                  </ManeuverGroup>
                </Act>
              </Story>
            </Storyboard>
          </OpenSCENARIO>
          XML

      - name: Validate generated xosc sample
        run: |
          python scripts/validate_xosc.py .tmp/sim --report .tmp/sim/xosc_validation_report.json

      - name: Upload xosc validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xosc-validation-report
          path: .tmp/sim/xosc_validation_report.json
          if-no-files-found: ignore

  esmini-smoke-optional:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_esmini_smoke }}
    needs: xosc-validation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install runtime libs for esmini
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libgl1 libglib2.0-0 libxrandr2 libxinerama1 libxcursor1 libxi6 libxrender1

      - name: Download esmini binary
        run: |
          mkdir -p tools/esmini
          curl -L -o tools/esmini/esmini-bin_Linux.zip https://github.com/esmini/esmini/releases/download/v2.60.0/esmini-bin_Linux.zip
          unzip -o tools/esmini/esmini-bin_Linux.zip -d tools/esmini
          chmod +x tools/esmini/esmini/bin/esmini

      - name: Generate minimal xosc sample
        run: |
          mkdir -p .tmp/sim
          cat > .tmp/sim/minimal.xosc <<'XML'
          <?xml version="1.0" encoding="UTF-8"?>
          <OpenSCENARIO>
            <FileHeader revMajor="1" revMinor="0" date="2026-03-16T00:00:00Z" description="ci" author="github-actions"/>
            <Entities>
              <ScenarioObject name="ego" />
            </Entities>
            <Storyboard>
              <Story name="story">
                <Act name="act">
                  <ManeuverGroup name="mg" maximumExecutionCount="1">
                    <Maneuver name="m">
                      <Event name="e" priority="overwrite">
                        <Action name="a">
                          <PrivateAction>
                            <RoutingAction>
                              <FollowTrajectoryAction>
                                <Trajectory name="traj" closed="false">
                                  <Shape>
                                    <Polyline>
                                      <Vertex time="0.0"><Position><WorldPosition x="0" y="0" z="0" h="0" p="0" r="0"/></Position></Vertex>
                                      <Vertex time="1.0"><Position><WorldPosition x="1" y="0" z="0" h="0" p="0" r="0"/></Position></Vertex>
                                    </Polyline>
                                  </Shape>
                                </Trajectory>
                              </FollowTrajectoryAction>
                            </RoutingAction>
                          </PrivateAction>
                        </Action>
                      </Event>
                    </Maneuver>
                  </ManeuverGroup>
                </Act>
              </Story>
            </Storyboard>
          </OpenSCENARIO>
          XML

      - name: Run esmini smoke on sample
        run: |
          python scripts/run_esmini_smoke.py .tmp/sim \
            --esmini-bin tools/esmini/esmini/bin/esmini \
            --timeout-sec 30 \
            --treat-timeout-as-pass \
            --report .tmp/sim/esmini_smoke_report.json

      - name: Upload esmini smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: esmini-smoke-report
          path: .tmp/sim/esmini_smoke_report.json
          if-no-files-found: ignore
