name: ci-nightly

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  nightly-perception-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run perception-focused test suite
        run: |
          pytest tests/unit -q
          pytest tests/regression -q

      - name: Run perception regression checker
        run: python scripts/run_perception_regression.py --atol 1e-9

      - name: Optional perception smoke (requires checked-in mini data)
        run: |
          if [ -d "data/nuscenes-mini/v1.0-mini" ]; then
            python scripts/run_perception_eval.py --scenes first --max-frames 2 --metrics basic --run-name nightly_smoke
          else
            echo "Skipping perception smoke: data/nuscenes-mini/v1.0-mini not present in runner workspace"
          fi

      - name: Upload smoke outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-outputs
          path: outputs/perception
          if-no-files-found: ignore
