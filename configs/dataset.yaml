# ─────────────────────────────────────────────────────────────────────────────
# Dataset registry for ad-eval-suite
# ─────────────────────────────────────────────────────────────────────────────
datasets:
  nuscenes_mini:
    root: data/nuscenes-mini
    version: v1.0-mini
    maps: maps
    samples: samples
    sweeps: sweeps
    category_schema: detection_10cls

  nuscenes_full:
    root: /mnt/data/nuscenes-full
    version: v1.0
    maps: maps
    samples: samples
    sweeps: sweeps
    category_schema: detection_10cls

active_dataset: nuscenes_mini

# ─────────────────────────────────────────────────────────────────────────────
# Category taxonomy schemas
#
#  raw              – keep all 23 original nuScenes category names unchanged
#  detection_10cls  – NuScenes official 10-class detection benchmark mapping
#  l2_planning      – 4 semantic classes suited for planning-level evaluation
#
# mode: raw
#   No remapping is applied; each box keeps its original category_name.
#
# mode: remap
#   Each box's category_name is replaced by the target key whose list contains
#   the original name.
#   ignore_unlisted: true  – boxes not covered by any mapping list are dropped
#   ignore_unlisted: false – such boxes keep their original category_name
# ─────────────────────────────────────────────────────────────────────────────
category_schemas:

  # ── 1. Raw — all 23 original nuScenes classes, no remapping ─────────────────
  raw:
    mode: raw

  # ── 2. NuScenes standard 10-class detection benchmark ───────────────────────
  # Mirrors the official nuScenes detection challenge class list.
  # vehicle.emergency.*, animal, and movable_object.pushable_pullable etc. are
  # not part of this benchmark and are dropped (ignore_unlisted: true).
  detection_10cls:
    mode: remap
    ignore_unlisted: true
    mapping:
      car:
        - vehicle.car
      truck:
        - vehicle.truck
      bus:
        - vehicle.bus.bendy
        - vehicle.bus.rigid
      trailer:
        - vehicle.trailer
      construction_vehicle:
        - vehicle.construction
      pedestrian:
        - human.pedestrian.adult
        - human.pedestrian.child
        - human.pedestrian.wheelchair
        - human.pedestrian.stroller
        - human.pedestrian.personal_mobility
        - human.pedestrian.police_officer
        - human.pedestrian.construction_worker
      motorcycle:
        - vehicle.motorcycle
      bicycle:
        - vehicle.bicycle
      traffic_cone:
        - movable_object.trafficcone
      barrier:
        - movable_object.barrier

  # ── 3. L2 Planning — 4 semantic top-level classes ───────────────────────────
  # Coarsens all nuScenes labels into four planning-relevant groups:
  #   vehicle    – motorised vehicles (including emergency vehicles)
  #   pedestrian – all humans and animals
  #   cyclist    – two-wheeled road users (bicycle + motorcycle)
  #   object     – static / movable obstacles (barriers, cones, debris …)
  # ignore_unlisted: false so no box is silently dropped.
  l2_planning:
    mode: remap
    ignore_unlisted: false
    mapping:
      vehicle:
        - vehicle.car
        - vehicle.truck
        - vehicle.bus.bendy
        - vehicle.bus.rigid
        - vehicle.trailer
        - vehicle.construction
        - vehicle.emergency.ambulance
        - vehicle.emergency.police
      pedestrian:
        - human.pedestrian.adult
        - human.pedestrian.child
        - human.pedestrian.wheelchair
        - human.pedestrian.stroller
        - human.pedestrian.personal_mobility
        - human.pedestrian.police_officer
        - human.pedestrian.construction_worker
        - animal
      cyclist:
        - vehicle.motorcycle
        - vehicle.bicycle
      object:
        - movable_object.barrier
        - movable_object.trafficcone
        - movable_object.pushable_pullable
        - movable_object.debris
        - static_object.bicycle_rack
